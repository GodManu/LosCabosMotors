<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Los Cabos Motors - Rifa de Boletos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background-color: #bebebe;
      color: white;
    }
    header {
      background-color: #881414;
      padding: 20px 0;
      text-align: center;
    }
    header h1 {
      margin: 0;
    }
    #boletos-container {
      max-height: 250px;
      overflow-y: auto;
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: black;
      margin: 20px auto;
      width: 90%;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    #boletos-container button {
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #4d494c;
      cursor: pointer;
      user-select: none;
      background-color: #d3d3d3;
      color: black;
      font-weight: bold;
      min-width: 60px;
      text-align: center;
    }
    #boletos-container button.apartado {
      background-color: black;
      color: #555;
      cursor: not-allowed;
      text-decoration: line-through;
    }
    #boletos-container button.seleccionado {
      background-color: #28a745;
      color: white;
    }
    #seleccionados-container {
      max-height: 60px;
      overflow-x: auto;
      background-color: #881414;
      padding: 10px;
      margin: 0 auto 20px auto;
      width: 90%;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      color: white;
      font-weight: bold;
    }
    #seleccionados-container span {
      background: #ffbb33;
      padding: 4px 10px;
      border-radius: 6px;
      user-select: none;
    }
    .form-container {
      max-width: 400px;
      margin: 0 auto 30px auto;
      background: #881414;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      color: white;
    }
    .form-container input {
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }
    .form-container button {
      width: 100%;
      padding: 12px;
      background: #ffbb33;
      border: none;
      font-weight: bold;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      color: black;
    }
  </style>
</head>
<body>

<header>
  <h1>Los Cabos Motors</h1>
  <p>Aparta tus boletos para la rifa</p>
</header>

<div id="seleccionados-container" title="Boletos seleccionados"></div>

<div id="boletos-container"></div>

<div class="form-container">
  <input type="text" id="nombre" placeholder="Nombre" required />
  <input type="text" id="apellido" placeholder="Apellido" required />
  <input type="text" id="estado" placeholder="Estado" required />
  <input type="text" id="ciudad" placeholder="Ciudad" required />
  <input type="tel" id="telefono" placeholder="Teléfono" required />
  <button onclick="enviarWhatsApp()">📩 Apartar y Enviar por WhatsApp</button>
</div>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // Config Firebase - pon tus datos reales aquí
  const firebaseConfig = {
    apiKey: "TU_APIKEY",
    authDomain: "TU_AUTHDOMAIN",
    databaseURL: "TU_DATABASEURL",
    projectId: "TU_PROJECTID",
    storageBucket: "TU_STORAGEBUCKET",
    messagingSenderId: "TU_MESSAGINGSENDERID",
    appId: "TU_APPID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const apartadosRef = db.ref("boletosApartados");
  const totalBoletos = 60000;
  const boletosSeleccionados = new Set();
  let boletosApartados = new Set();

  const boletosContainer = document.getElementById("boletos-container");
  const seleccionadosContainer = document.getElementById("seleccionados-container");

  // Carga boletos apartados de Firebase y actualiza vista
  apartadosRef.on("value", (snapshot) => {
    boletosApartados.clear();
    const data = snapshot.val() || {};
    for (const key in data) {
      data[key].boletos.forEach(n => boletosApartados.add(n));
    }
    renderBoletos();
    actualizarSeleccionados();
  });

  function renderBoletos() {
    boletosContainer.innerHTML = "";
    for (let i = 1000; i <= totalBoletos; i++) {
      const numStr = String(i).padStart(5, "0");
      const btn = document.createElement("button");
      btn.textContent = numStr;

      if (boletosApartados.has(i)) {
        btn.classList.add("apartado");
        btn.disabled = true;
      } else if (boletosSeleccionados.has(i)) {
        btn.classList.add("seleccionado");
      }

      btn.onclick = () => {
        if (boletosApartados.has(i)) return; // no hacer nada si está apartado
        if (boletosSeleccionados.has(i)) {
          boletosSeleccionados.delete(i);
        } else {
          boletosSeleccionados.add(i);
        }
        renderBoletos();
        actualizarSeleccionados();
      };

      boletosContainer.appendChild(btn);
    }
  }

  function actualizarSeleccionados() {
    seleccionadosContainer.innerHTML = "";
    if (boletosSeleccionados.size === 0) {
      seleccionadosContainer.textContent = "No hay boletos seleccionados";
      return;
    }
    boletosSeleccionados.forEach(n => {
      const span = document.createElement("span");
      span.textContent = String(n).padStart(5, "0");
      seleccionadosContainer.appendChild(span);
    });
  }

  function enviarWhatsApp() {
    const nombre = document.getElementById("nombre").value.trim();
    const apellido = document.getElementById("apellido").value.trim();
    const estado = document.getElementById("estado").value.trim();
    const ciudad = document.getElementById("ciudad").value.trim();
    const telefono = document.getElementById("telefono").value.trim();

    if (!nombre || !apellido || !estado || !ciudad || !telefono) {
      alert("Por favor completa todos los campos.");
      return;
    }
    if (boletosSeleccionados.size === 0) {
      alert("Por favor selecciona al menos un boleto.");
      return;
    }

    const boletosArray = Array.from(boletosSeleccionados).sort((a,b) => a-b);
    const boletosTexto = boletosArray.map(n => String(n).padStart(5, "0")).join(", ");

    // Guardar en Firebase
    const nuevoApartado = {
      nombre,
      apellido,
      estado,
      ciudad,
      telefono,
      boletos: boletosArray,
      fecha: Date.now()
    };
    apartadosRef.push(nuevoApartado)
      .then(() => {
        alert("Boletos apartados correctamente!");
        // Abrir WhatsApp con mensaje
        const mensaje = `Hola! Soy ${nombre} ${apellido}, quiero apartar los boletos: ${boletosTexto}. Vivo en ${ciudad}, ${estado}. Mi número es ${telefono}.`;
        const url = `https://wa.me/5216241181978?text=${encodeURIComponent(mensaje)}`;
        window.open(url, "_blank");
        boletosSeleccionados.clear();
        renderBoletos();
        actualizarSeleccionados();
        // Limpiar formulario
        document.getElementById("nombre").value = "";
        document.getElementById("apellido").value = "";
        document.getElementById("estado").value = "";
        document.getElementById("ciudad").value = "";
        document.getElementById("telefono").value = "";
      })
      .catch((err) => alert("Error al guardar los datos: " + err.message));
  }

  renderBoletos();
</script>

</body>
</html>
