<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Los Cabos Motors</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #121212;
      color: #fff;
    }
    .chat-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #ffbb33;
      color: #000;
      border: none;
      padding: 12px 16px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    #chat-box {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 350px;
      max-height: 500px;
      background: #1f1f1f;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }
    #login-screen, #chat-screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    #login-screen {
      padding: 20px;
    }
    #login-screen input {
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
      width: 100%;
    }
    #chat-header {
      padding: 10px;
      background: #222;
      font-weight: bold;
      text-align: center;
    }
    #users-list {
      background: #2d2d2d;
      padding: 10px;
      font-size: 0.85rem;
      max-height: 80px;
      overflow-y: auto;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .message {
      margin-bottom: 10px;
      word-wrap: break-word;
    }
    .message .time {
      font-size: 0.75rem;
      color: #aaa;
    }
    #chat-form {
      display: flex;
      padding: 10px;
      background: #2a2a2a;
    }
    #message-input {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 5px;
    }
    #send-btn {
      background: #ffbb33;
      border: none;
      padding: 8px 12px;
      margin-left: 8px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<button class="chat-toggle" onclick="toggleChat()">💬 Chat</button>
<div id="chat-box">
  <div id="login-screen">
    <h3>Ingresa tu nombre</h3>
    <input type="text" id="name-input" placeholder="Tu nombre">
    <button onclick="enterChat()">Entrar al chat</button>
  </div>
  <div id="chat-screen">
    <div id="chat-header">🚘 Chat - Los Cabos Motors</div>
    <div id="users-list"></div>
    <div id="messages"></div>
    <form id="chat-form">
      <input type="text" id="message-input" placeholder="Escribe un mensaje...">
      <button type="submit" id="send-btn">Enviar</button>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDiM6ANhCufeBlc-zbAR_p3Ys_42q9dDJU",
    authDomain: "chatloscabosmotors.firebaseapp.com",
    databaseURL: "https://chatloscabosmotors-default-rtdb.firebaseio.com",
    projectId: "chatloscabosmotors",
    storageBucket: "chatloscabosmotors.appspot.com",
    messagingSenderId: "312586924965",
    appId: "1:312586924965:web:ae4868021f68728e74ae4c"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let username = "";
  const userId = Math.random().toString(36).substring(2, 15);
  const usersRef = db.ref("users");
  const messagesRef = db.ref("messages");

  function toggleChat() {
    const chatBox = document.getElementById("chat-box");
    chatBox.style.display = chatBox.style.display === "flex" ? "none" : "flex";
  }

  function enterChat() {
    const input = document.getElementById("name-input");
    username = input.value.trim();
    if (!username) return;

    document.getElementById("login-screen").style.display = "none";
    document.getElementById("chat-screen").style.display = "flex";

    usersRef.child(userId).set({ name: username });
    usersRef.child(userId).onDisconnect().remove();
  }

  function addMessageToScreen(data, isMe) {
    const div = document.createElement("div");
    div.className = "message";
    const color = stringToColor(data.name);
    const time = new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    div.innerHTML = `<strong style="color:${color}">${data.name}</strong>: ${formatEmojis(data.text)}<div class="time">${time}</div>`;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
  }

  function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = str.charCodeAt(i) + ((hash << 5) - hash);
    }
    const color = Math.abs(hash).toString(16).substring(0, 6);
    return `#${color.padStart(6, '0')}`;
  }

  function formatEmojis(text) {
    return text
      .replace(/:\)/g, '😊')
      .replace(/:\(/g, '😢')
      .replace(/:D/g, '😄')
      .replace(/<3/g, '❤️')
      .replace(/:p/g, '😜');
  }

  document.getElementById("chat-form").addEventListener("submit", function(e) {
    e.preventDefault();
    const message = document.getElementById("message-input").value.trim();
    if (message === "") return;
    messagesRef.push({ name: username, text: message, time: Date.now() });
    document.getElementById("message-input").value = "";
  });

  messagesRef.limitToLast(100).on("child_added", (snapshot) => {
    const msg = snapshot.val();
    addMessageToScreen(msg, msg.name === username);
  });

  usersRef.on("value", (snapshot) => {
    const users = snapshot.val();
    let list = '<strong>Conectados:</strong><br>';
    for (const key in users) {
      list += `<span style="color:${stringToColor(users[key].name)}">${users[key].name}</span><br>`;
    }
    document.getElementById("users-list").innerHTML = list;
  });
</script>
</body>
</html>
