<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat Público - Los Cabos Motors</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      color: #f0f0f0;
      font-family: 'Roboto', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background-color: rgba(26, 42, 108, 0.8);
      padding: 1rem;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: white;
      text-shadow: 0 0 5px #000;
    }

    #chat-container {
      width: 90%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      margin: 2rem 0;
      padding: 1rem;
      box-shadow: 0 0 20px rgba(26, 42, 108, 0.6);
      display: flex;
      flex-direction: column;
    }

    #messages {
      height: 400px;
      overflow-y: auto;
      border-radius: 10px;
      padding: 10px;
      background: rgba(10, 25, 80, 0.8);
      margin-bottom: 1rem;
    }

    .message {
      padding: 8px 12px;
      margin: 6px 0;
      border-radius: 10px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .me {
      background: #1939b7;
      align-self: flex-end;
      color: #e0e0ff;
    }

    .other {
      background: #2f3d91;
      align-self: flex-start;
      color: #c0c0ff;
    }

    #chat-form {
      display: flex;
    }

    #message-input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px 0 0 8px;
      font-size: 1rem;
    }

    #send-btn {
      background-color: #1939b7;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 0 8px 8px 0;
      font-size: 1rem;
      cursor: pointer;
    }

    #send-btn:hover {
      background-color: #0f2675;
    }
  </style>
</head>

  <header>🚘 Chat Oficial - Los Cabos Motors</header>

  <div id="chat-container">
    <div id="messages"></div>
    <form id="chat-form">
      <input type="text" id="message-input" placeholder="Escribe tu mensaje..." required />
      <button type="submit" id="send-btn">Enviar</button>
    </form>
